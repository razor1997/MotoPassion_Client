<div class="grid grid-cols-1 gap-6 p-4">
  <div *ngIf="loading">Ładowanie...</div>

  <div *ngIf="!loading && eventsAutomotive.length === 0">
    Brak wydarzeń do wyświetlenia.
  </div>

  <app-event-list
    *ngIf="!loading && eventsAutomotive.length > 0"
    [eventsAutomotive]="eventsAutomotive">
  </app-event-list>
</div>
