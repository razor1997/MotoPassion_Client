<div class="list">
  <div class="empty" *ngIf="expenses.length === 0">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sticky-note-off-icon lucide-sticky-note-off"><path d="M15 3v5a1 1 0 0 0 1 1h5"/><path d="m2 2 20 20"/><path d="M3.586 3.586A2 2 0 0 0 3 5v14a2 2 0 0 0 2 2h14a2 2 0 0 0 1.414-.586"/><path d="M8.656 3H15a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 21 9v6.344"/></svg>
     Brak kosztów w wybranym zakresie.
  </div>
  <div class="row header" *ngIf="expenses.length !== 0">
    <div class="col date">Data</div>
    <div class="col category">Kategoria</div>
    <div class="col mileage">Przebieg</div>
    <div class="col title">Opis</div>
    <div class="col invoice">Faktura/Paragon</div>
    <div class="col cost">Koszt</div>
    <div class="col actions">Akcje</div>
  </div>
</div>

<app-expense-part
  *ngFor="let e of expenses"
  [expense]="e"
  (remove)="remove.emit($event)">
</app-expense-part>
