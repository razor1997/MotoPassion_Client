<div class="page__title">MotoPassion</div>

<div class="participant-card" *ngIf="participant">

  <!-- Profile header -->
  <div class="profile-header">
    <div class="profile-header__avatar">
      <img [src]="participant.avatarUrl" alt="">
    </div>
    <div class="profile-header__info">
      <h1 class="profile-header__name">{{ participant.name }}</h1>
      <div class="profile-header__meta">
<!--        <span class="icon icon&#45;&#45;verified" *ngIf="participant.verified"></span>-->
        <span class="icon icon--pin"></span>
        <span>{{ participant.baseLocation }}</span>
      </div>
    </div>
    <div class="profile-header__buttons">
      <button *ngIf="isOwnProfile" class="btn btn--outline">Zarządzaj profilem</button>
    </div>
  </div>

  <!-- About + Vehicles -->
  <div class="grid-2 section">
    <div>
      <div class="section__title">O mnie</div>
      <div class="about-box">{{ participant.bio }}</div>
    </div>

    <div>
      <div class="section__title">Moje Pojazdy</div>
      <div class="vehicle-row">

<!--          </div>-->
<!--        </div>-->

        <div class="vehicle-card vehicle-card--add">
          <span class="icon--plus">+</span>
          <span>Dodaj Pojazd</span>
        </div>
      </div>
    </div>
  </div>

    <div>

      <div class="events-columns">
